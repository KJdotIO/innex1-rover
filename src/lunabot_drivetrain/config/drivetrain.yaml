# Drivetrain bridge configuration for the INNEX-1 rover.
#
# Current bench-proven hardware: 4x GR-WM4-V3 brushed DC motors driven by 2x
# Sabertooth 2x32 controllers through a Teensy 4.1. The Teensy reads the
# encoders and exposes USB serial to the Jetson.
#
# Wheel order: [FL, FR, RL, RR]

drivetrain_bridge:
  ros__parameters:
    # --- Serial ---
    # Prefer the stable by-id path on the Jetson when udev exposes it:
    # /dev/serial/by-id/usb-Teensyduino_USB_Serial_19852100-if00
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200

    # Current path: ROS 2 on Jetson -> Teensy USB serial -> two Sabertooths.
    # The older direct Sabertooth paths remain available as "legacy_simplified"
    # and "packetized" for controlled bench tests.
    serial_protocol: "teensy_line"
    reset_encoders_on_start: true

    # Real hardware should fail closed if the serial controller is missing.
    # Set true only for explicit desktop/Jetson dry-runs with no motor output.
    dry_run: false

    # Consume the safety-gated command stream, not the raw collision-monitor
    # output. The velocity_gate publishes zero when drivetrain health is bad.
    cmd_vel_topic: "/cmd_vel_gated"

    # Packet Serial addresses. Used only when serial_protocol is "packetized".
    sabertooth_addresses: [128, 129]

    # --- Kinematics ---
    # Track width (centre-to-centre of left and right wheels) in metres.
    track_width_m: 0.44
    # Wheel radius in metres.
    wheel_radius_m: 0.065

    # --- Encoders ---
    # Counts per full revolution of the output shaft (after gearbox).
    encoder_counts_per_rev: 720
    # Encoder counts arrive from the Teensy telemetry line as FL, RL, FR, RR.
    # The ROS bridge reorders them to the package convention: FL, FR, RL, RR.

    # --- Safety ---
    # If no cmd_vel is received within this period, send a stop.
    command_timeout_s: 0.5
    # Maximum throttle (0.0–1.0) during first-motion bringup.
    max_throttle: 1.0
    # Encoder stall detection: if commanded throttle > threshold and
    # measured velocity < min_velocity_rps for stall_timeout_s, fault.
    stall_throttle_threshold: 0.15
    stall_min_velocity_rps: 0.05
    stall_timeout_s: 2.0

    # --- Rates ---
    control_loop_hz: 20.0
    telemetry_publish_hz: 10.0
