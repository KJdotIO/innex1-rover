# Drivetrain bridge configuration for the INNEX-1 rover.
#
# Hardware: 4x GR-WM4-V4 brushed DC motors driven by 2x Sabertooth 2x32
# motor controllers via Legacy Simplified Serial at 9600 baud.
# Feedback: Hall-sensor quadrature encoders on Jetson GPIO pins.
#
# Wheel order: [FL, FR, RL, RR]

drivetrain_bridge:
  ros__parameters:
    # --- UART ---
    serial_port: "/dev/ttyTHS1"
    baud_rate: 9600

    # The CDR calls this Simplified Serial. In the Sabertooth 2x32 manual this
    # byte protocol is Legacy Simplified Serial: Jetson UART TX to S1, with
    # Jetson and Sabertooth sharing a logic ground.
    # Use "packetized" only if the Sabertooths are set for Packet Serial.
    serial_protocol: "legacy_simplified"

    # Real hardware should fail closed if the serial controller is missing.
    # Set true only for explicit desktop/Jetson dry-runs with no motor output.
    dry_run: false

    # Consume the safety-gated command stream, not the raw collision-monitor
    # output. The velocity_gate publishes zero when drivetrain health is bad.
    cmd_vel_topic: "/cmd_vel_gated"

    # Packet Serial addresses. Used only when serial_protocol is "packetized".
    sabertooth_addresses: [128, 129]

    # --- Kinematics ---
    # Track width (centre-to-centre of left and right wheels) in metres.
    track_width_m: 0.44
    # Wheel radius in metres.
    wheel_radius_m: 0.065

    # --- Encoders ---
    # Counts per full revolution of the output shaft (after gearbox).
    encoder_counts_per_rev: 720
    # Jetson GPIO pin numbers for encoder channels [A, B] per wheel.
    # [FL_A, FL_B, FR_A, FR_B, RL_A, RL_B, RR_A, RR_B]
    # Placeholder pins. Update to match the actual PCB wiring.
    encoder_gpio_pins: [7, 11, 13, 15, 29, 31, 33, 35]

    # --- Safety ---
    # If no cmd_vel is received within this period, send a stop.
    command_timeout_s: 0.5
    # Maximum throttle (0.0–1.0) during first-motion bringup.
    max_throttle: 1.0
    # Encoder stall detection: if commanded throttle > threshold and
    # measured velocity < min_velocity_rps for stall_timeout_s, fault.
    stall_throttle_threshold: 0.15
    stall_min_velocity_rps: 0.05
    stall_timeout_s: 2.0

    # --- Rates ---
    control_loop_hz: 20.0
    telemetry_publish_hz: 10.0

teensy_drivetrain_bridge:
  ros__parameters:
    # Teensy 4.1 USB CDC endpoint. Prefer a udev symlink on the Jetson.
    serial_port: "/dev/teensy_motor_io"
    baud_rate: 115200
    dry_run: false
    cmd_vel_topic: "/cmd_vel_gated"

    track_width_m: 0.44
    wheel_radius_m: 0.065
    encoder_counts_per_rev: 720

    command_timeout_s: 0.5
    teensy_timeout_s: 0.35
    max_throttle: 1.0

    control_loop_hz: 20.0
    telemetry_publish_hz: 10.0
