### Local EKF Configuration ###
# Smooth odom -> base_footprint from wheel odometry + IMU.
# RTAB-Map handles the map -> odom correction; no global EKF needed.

ekf_filter_node_odom:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    reset_on_time_jump: true
    two_d_mode: true
    publish_acceleration: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # [X, Y, Z, Roll, Pitch, Yaw, VX, VY, VZ, VRoll, VPitch, VYaw, AX, AY, AZ]

    # Wheel odometry: position + velocity
    odom0: /odom
    odom0_config:
      [
        true,
        true,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
      ]

    # IMU: yaw orientation + angular velocity + linear acceleration
    imu0: /imu/data_raw
    imu0_config:
      [
        false,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
        false,
        false,
        true,
        true,
        false,
        false,
      ]
