### Dual EKF Configuration ###
# Local EKF: smooth odom -> base_footprint (continuous, never jumps)
# Global EKF: seeded once from the start-zone tag, then propagated from the
# local EKF without continuous tag fusion while driving.

ekf_filter_node_odom:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    reset_on_time_jump: true
    two_d_mode: true
    publish_acceleration: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # [X, Y, Z, Roll, Pitch, Yaw, VX, VY, VZ, VRoll, VPitch, VYaw, AX, AY, AZ]

    # Wheel odometry: position + velocity
    odom0: /odom
    odom0_config:
      [
        true,
        true,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
      ]

    # IMU: yaw orientation + angular velocity + linear acceleration
    imu0: /imu/data_raw
    imu0_config:
      [
        false,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
        false,
        false,
        true,
        true,
        false,
        false,
      ]

    # June baseline: local EKF only fuses wheel odom + IMU.
    # Visual odometry stays out of the baseline until the gate is launched,
    # tested, and explicitly chosen as part of the runtime story.

ekf_filter_node_map:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    sensor_timeout: 0.4
    reset_on_time_jump: true
    two_d_mode: true
    smooth_lagged_data: true
    history_length: 0.5
    publish_acceleration: false
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map

    # [X, Y, Z, Roll, Pitch, Yaw, VX, VY, VZ, VRoll, VPitch, VYaw, AX, AY, AZ]

    # Continuous motion source from local EKF (odom -> base_footprint).
    # The competition baseline treats AprilTag as an initialisation / recovery
    # aid, not as a live correction source while the rover is moving.
    odom0: /odometry/local
    odom0_config:
      [
        true,
        true,
        false,
        false,
        false,
        true,
        true,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
      ]
