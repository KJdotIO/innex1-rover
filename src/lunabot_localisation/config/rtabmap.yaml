### RTAB-Map SLAM Configuration ###
# RTAB-Map owns the map -> odom transform via visual loop closure.
# External EKF provides odom -> base_footprint via /odometry/local.
# Internal visual odometry is disabled; the SLAM node only builds
# and optimises the pose graph from RGB-D features and landmarks.

rtabmap:
  ros__parameters:
    publish_tf: true
    publish_tf_odom: false

    subscribe_depth: true
    subscribe_rgb: true
    subscribe_stereo: false
    subscribe_rgbd: false
    subscribe_odom_info: false
    approx_sync: true
    approx_sync_max_interval: 0.02

    frame_id: "base_footprint"
    odom_frame_id: "odom"
    map_frame_id: "map"

    topic_queue_size: 10
    sync_queue_size: 10
    wait_for_transform: 0.2

    # Grid: ground/obstacle segmentation for /cloud_obstacles output
    Grid/CellSize: "0.05"
    Grid/FromDepth: "true"
    Grid/3D: "true"
    Grid/Sensor: "2"
    Grid/MaxGroundAngle: "30"
    Grid/MinGroundHeight: "-0.05"
    Grid/MaxGroundHeight: "0.10"
    Grid/MaxObstacleHeight: "0.8"
    Grid/MinClusterSize: "20"
    Grid/ClusterRadius: "0.1"
    Grid/RangeMin: "0.3"
    Grid/RangeMax: "4.0"
    Grid/RayTracing: "true"
    Grid/GroundIsObstacle: "false"
    Grid/FlatObstacleDetected: "true"
    Grid/NormalsSegmentation: "false"
    RGBD/CreateOccupancyGrid: "true"

    # Flat arena: constrain optimisation to 2D
    Optimizer/Slam2D: "true"
    Optimizer/Strategy: "2"

    # Proximity-based loop closure for revisited areas
    RGBD/ProximityBySpace: "true"

    # Feature detection for loop closure
    Vis/MinInliers: "15"
    Vis/FeatureType: "8"
    Vis/MaxFeatures: "500"

    # Keep the database in memory for speed (no disk I/O)
    Rtabmap/DatabaseInMemory: "true"

    # AprilTag landmark variance
    landmark_linear_variance: 0.0001
    landmark_angular_variance: 9999.0
