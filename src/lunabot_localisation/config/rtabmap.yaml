# ── RTAB-Map Configuration ────────────────────────────────────────────
# Design: No visual odometry. EKF (wheel odom + IMU) carries navigation.
# RTAB-Map's job is: build a 2D occupancy map for Nav2 and perform
# loop closure from images. Fed the EKF-fused odom directly.
#
# KEY: use bounded approximate sync in sim:
#  - too tight starves callbacks,
#  - unlimited allows stale pairings that hurt matching.
# 0.20s is a compromise for Gazebo bridge jitter.
# ──────────────────────────────────────────────────────────────────────

rtabmap:
  ros__parameters:
    # TF: Global EKF owns map→odom. RTAB-Map only builds the map.
    publish_tf: false
    frame_id: "base_footprint"
    odom_frame_id: "odom"
    map_frame_id: "map"

    # ── Subscription mode ──
    subscribe_rgb: true
    subscribe_depth: true
    subscribe_stereo: false
    subscribe_rgbd: false
    approx_sync: true
    approx_sync_max_interval: 0.20
    subscribe_odom_info: false

    # ── Queues ──
    topic_queue_size: 8
    sync_queue_size: 8
    wait_for_transform: 0.3

    # ── Mapping ──
    Grid/CellSize: "0.05"
    Grid/RangeMax: "4.0"
    Grid/RangeMin: "0.15"
    Grid/MaxGroundAngle: "30"
    Grid/MaxObstacleHeight: "0.6"
    Grid/MaxGroundHeight: "0.05"
    Grid/NormalsSegmentation: "false"

    # ── Loop closure / proximity ──
    RGBD/ProximityBySpace: "true"
    RGBD/AngularUpdate: "0.05"
    RGBD/LinearUpdate: "0.05"

    # ── 2D optimisation (flat arena) ──
    Optimizer/Slam2D: "true"

    # ── Memory management ──
    # Don't grow the database unboundedly in sim
    Mem/IncrementalMemory: "true"
    Mem/STMSize: "30"

    # ── Feature matching for loop closure ──
    Kp/MaxFeatures: "400"
