kiss_icp_node:
  ros__parameters:
    data:
      deskew: true
      min_range: 0.15
      max_range: 12.0

    mapping:
      voxel_size: 0.20
      max_points_per_voxel: 20

    adaptive_threshold:
      initial_threshold: 1.0
      min_motion_th: 0.05

    registration:
      max_num_iterations: 200
      convergence_criterion: 0.0001
      max_num_threads: 0
