bt_navigator:
  ros__parameters:
    use_sim_time: true
    default_nav_to_pose_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      max_linear_vel: 0.18
      desired_linear_vel: 0.18
      max_angular_vel: 0.5
      lookahead_dist: 0.45
      min_approach_linear_velocity: 0.08
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.30
      cost_scaling_gain: 0.6
      inflation_cost_scaling_factor: 4.0
      regulated_linear_scaling_min_speed: 0.12
      max_allowed_time_to_collision_up_to_carrot: 0.75

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: true
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      allow_unknown: true
      motion_model_for_search: "REEDS_SHEPP"
      minimum_turning_radius: 0.40
      reverse_penalty: 2.1
      change_penalty: 0.0
      non_straight_penalty: 2.0
      cost_penalty: 3.0
      max_iterations: 1000000
      max_planning_time: 5.0

# --- Global costmap ---
# StaticLayer only, fed by RTAB-Map's /map occupancy grid.
# No live sensor data here; the map updates when RTAB-Map re-optimises.
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.25
      resolution: 0.05
      track_unknown_space: false
      rolling_window: false
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.30

      always_send_full_costmap: true

# --- Local costmap ---
# ObstacleLayer from /depth_scan (depthimage_to_laserscan output).
# inf_is_valid: true ensures empty rays clear ghost obstacles.
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      robot_radius: 0.25
      update_frequency: 6.0
      publish_frequency: 3.0
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 1
        observation_sources: depth_scan
        depth_scan:
          topic: /depth_scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          inf_is_valid: true
          min_obstacle_height: 0.0
          max_obstacle_height: 2.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 4.0

      always_send_full_costmap: true
