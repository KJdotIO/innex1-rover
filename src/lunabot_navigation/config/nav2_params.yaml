# Nav2 parameters for UK Lunabotics innex1 rover
# Costmap uses: obstacle layer (boulders), crater layer (negative obstacles),
# and inflation around both.

bt_navigator:
  ros__parameters:
    default_bt_xml_filename: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      max_linear_vel: 0.3
      desired_linear_vel: 0.3
      max_angular_vel: 0.5

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# -- COSTMAPS --

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.25
      resolution: 0.05
      track_unknown_space: false
      rolling_window: true
      width: 10
      height: 8
      use_maximum: true
      plugins: ["obstacle_layer", "crater_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: camera_points
        camera_points:
          topic: /camera_front/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.15
          max_obstacle_height: 0.8
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      crater_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/crater_grid"
        map_subscribe_transient_local: false
        subscribe_to_updates: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.55

      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.25
      rolling_window: true
      track_unknown_space: false
      width: 3
      height: 3
      resolution: 0.05
      use_maximum: true
      plugins: ["obstacle_layer", "crater_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: camera_points
        camera_points:
          topic: /camera_front/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.15
          max_obstacle_height: 0.8
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      crater_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/crater_grid"
        map_subscribe_transient_local: false
        subscribe_to_updates: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.40
        cost_scaling_factor: 2.0
