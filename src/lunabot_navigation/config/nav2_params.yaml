# Nav2 parameters for UK Lunabotics innex1 rover
# Costmap uses: obstacle layer (depth camera boulders), voxel layer (LiDAR 3D
# boulders), crater layer (negative obstacles), denoise (speckle removal), and
# inflation around all obstacles.

bt_navigator:
  ros__parameters:
    default_bt_xml_filename: "$(find-pkg-share lunabot_navigation)/behavior_trees/navigate_to_pose_bounded_recovery.xml"

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      max_linear_vel: 0.3
      desired_linear_vel: 0.3
      max_angular_vel: 0.5
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

# -- COSTMAPS --

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.25
      resolution: 0.05
      track_unknown_space: false
      rolling_window: true
      width: 16
      height: 10
      use_maximum: true
      plugins: ["obstacle_layer", "voxel_layer", "crater_layer", "denoise_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: camera_points
        camera_points:
          topic: /camera_front/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.15
          max_obstacle_height: 0.8
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        observation_sources: lidar_points
        publish_voxel_map: false
        z_voxels: 10
        z_resolution: 0.1
        max_obstacle_height: 0.8
        origin_z: 0.0
        mark_threshold: 2
        lidar_points:
          topic: /ouster/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.10
          max_obstacle_height: 0.80
          clearing: true
          marking: true
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0

      crater_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/crater_grid"
        map_subscribe_transient_local: false
        subscribe_to_updates: false

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 2

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.55

      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.25
      rolling_window: true
      track_unknown_space: false
      width: 3
      height: 3
      resolution: 0.05
      use_maximum: true
      plugins: ["obstacle_layer", "voxel_layer", "crater_layer", "denoise_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: camera_points
        camera_points:
          topic: /camera_front/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.15
          max_obstacle_height: 0.8
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        observation_sources: lidar_points
        publish_voxel_map: false
        z_voxels: 10
        z_resolution: 0.1
        max_obstacle_height: 0.8
        origin_z: 0.0
        mark_threshold: 2
        lidar_points:
          topic: /ouster/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.10
          max_obstacle_height: 0.80
          clearing: true
          marking: true
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0

      crater_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/crater_grid"
        map_subscribe_transient_local: false
        subscribe_to_updates: false

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 2

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.40
        cost_scaling_factor: 2.0
