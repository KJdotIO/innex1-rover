# **ADDITIONAL NOTES:
# add use_sim_time: true, soon...

# config bt_nav to have default BT
bt_navigator:
  ros__parameters:
    use_sim_time: true
    default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"

# controller server with RPP
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]

    # choosing RPP
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      max_linear_vel: 0.3 # conservative for regolith
      desired_linear_vel: 0.3 # incase, max_linear_vel is not read
      max_angular_vel: 0.5 # prevents aggressive turning

# planner server
planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: true
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      allow_unknown: true
      motion_model_for_search: "REEDS_SHEPP"
      minimum_turning_radius: 0.40
      reverse_penalty: 2.1
      change_penalty: 0.0
      non_straight_penalty: 2.0
      cost_penalty: 3.0
      max_iterations: 1000000
      max_planning_time: 5.0

# // COSTMAPS //
# global costmap
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.28
      resolution: 0.05
      track_unknown_space: false
      rolling_window: true
      width: 12
      height: 12
      origin_x: -5.0
      origin_y: -8.0
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: front_points
        front_points:
          topic: /camera_front/points
          data_type: "PointCloud2"
          marking: true
          clearing: true
          max_obstacle_height: 0.45
          min_obstacle_height: 0.10
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 2.5
          raytrace_min_range: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.55

      always_send_full_costmap: true

# local costmap
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      robot_radius: 0.28
      plugins: ["obstacle_layer", "inflation_layer"]

      # Center the local window around the rover so the forward camera origin
      # stays inside bounds for obstacle raytracing while navigating.
      rolling_window: true
      width: 4
      height: 4
      origin_x: -2.0
      origin_y: -2.0
      resolution: 0.05

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: front_points
        front_points:
          topic: /camera_front/points
          data_type: "PointCloud2"
          marking: true
          clearing: true
          max_obstacle_height: 0.45
          min_obstacle_height: 0.10
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 2.5
          raytrace_min_range: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.60
        cost_scaling_factor: 3.5

      always_send_full_costmap: true
