bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/local
    bt_loop_duration: 20
    default_server_timeout: 100
    default_nav_to_pose_bt_xml: "navigate_to_pose_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 30.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.18
      lookahead_dist: 0.45
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.60
      lookahead_time: 1.5
      transform_tolerance: 0.5
      min_approach_linear_velocity: 0.08
      use_velocity_scaled_lookahead_dist: false
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.30
      cost_scaling_gain: 0.6
      inflation_cost_scaling_factor: 3.0
      regulated_linear_scaling_min_speed: 0.12
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_collision_detection: false
      allow_reversing: false
      max_angular_accel: 1.2
      max_robot_pose_search_dist: 10.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: true
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.50
      allow_unknown: true
      motion_model_for_search: "REEDS_SHEPP"
      minimum_turning_radius: 0.40
      reverse_penalty: 2.1
      change_penalty: 0.0
      non_straight_penalty: 2.0
      cost_penalty: 3.0
      max_iterations: 1000000
      max_planning_time: 5.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.28
      resolution: 0.05
      track_unknown_space: false
      rolling_window: true
      width: 12
      height: 12
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
        subscribe_to_updates: true
        transform_tolerance: 0.5

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: front_points
        front_points:
          topic: /camera_front/points
          data_type: "PointCloud2"
          marking: true
          clearing: true
          max_obstacle_height: 0.45
          min_obstacle_height: 0.10
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 2.5
          raytrace_min_range: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.55

      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      robot_radius: 0.28
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: front_points
        front_points:
          topic: /camera_front/points
          data_type: "PointCloud2"
          marking: true
          clearing: true
          max_obstacle_height: 0.45
          min_obstacle_height: 0.10
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 2.5
          raytrace_min_range: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.5

      always_send_full_costmap: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.6
    min_rotational_vel: 0.15
    rotational_acc_lim: 0.4

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.20, 0.0, 0.6]
    min_velocity: [-0.10, 0.0, -0.6]
    max_accel: [2.0, 0.0, 2.5]
    max_decel: [-2.0, 0.0, -2.5]
    odom_topic: /odometry/local
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

smoother_server:
  ros__parameters:
    use_sim_time: true

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200
