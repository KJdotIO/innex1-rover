# **ADDITIONAL NOTES:
# add use_sim_time: true, soon...

# config bt_nav to have default BT
bt_navigator:
  ros__parameters:
    use_sim_time: true
    default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"

# controller server with RPP
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]

    # choosing RPP
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      max_linear_vel: 0.18 # keep the robot inside the pointcloud refresh envelope
      desired_linear_vel: 0.18 # fallback if max_linear_vel is ignored
      max_angular_vel: 0.5 # prevents aggressive turning
      lookahead_dist: 0.45
      min_approach_linear_velocity: 0.08
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.30
      cost_scaling_gain: 0.6
      inflation_cost_scaling_factor: 4.0
      regulated_linear_scaling_min_speed: 0.12
      max_allowed_time_to_collision_up_to_carrot: 0.75

# planner server
planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: true
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      allow_unknown: true
      motion_model_for_search: "REEDS_SHEPP"
      minimum_turning_radius: 0.40
      reverse_penalty: 2.1
      change_penalty: 0.0
      non_straight_penalty: 2.0
      cost_penalty: 3.0
      max_iterations: 1000000
      max_planning_time: 5.0

# // COSTMAPS //
# global costmap
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map # changed to map as rtab map added
      robot_base_frame: base_footprint
      robot_radius: 0.25 # tuned to robot radius of 0.25m
      resolution: 0.05 # spec resolution
      track_unknown_space: false
      rolling_window: false
      width: 8
      height: 5
      plugins: ["static_layer", "voxel_layer", "denoise_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /camera_front/points
          data_type: "PointCloud2"
          transport_type: "raw"
          marking: true
          clearing: true
          expected_update_rate: 0.5
          observation_persistence: 0.5
          footprint_clearing_enabled: true
          tf_filter_tolerance: 0.2
          origin_z: 0.0
          z_resolution: 0.05
          z_voxels: 16
          unknown_threshold: 15
          mark_threshold: 0
          combination_method: 1
          max_obstacle_height: 0.50
          min_obstacle_height: 0.15
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 3.2
          raytrace_min_range: 0.0

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 2
        group_connectivity_type: 8

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.30

      always_send_full_costmap: false

# local costmap
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      robot_radius: 0.25
      update_frequency: 10.0
      publish_frequency: 5.0
      plugins: ["voxel_layer", "denoise_layer", "inflation_layer"]

      # rolling window
      rolling_window: true
      width: 4 # gives the controller more forward room in the arena
      height: 4
      resolution: 0.05

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /camera_front/points
          data_type: "PointCloud2"
          transport_type: "raw"
          marking: true
          clearing: true
          expected_update_rate: 0.5
          observation_persistence: 0.5
          footprint_clearing_enabled: true
          tf_filter_tolerance: 0.2
          origin_z: 0.0
          z_resolution: 0.05
          z_voxels: 16
          unknown_threshold: 15
          mark_threshold: 0
          combination_method: 1
          max_obstacle_height: 0.50
          min_obstacle_height: 0.15
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 3.2
          raytrace_min_range: 0.0

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 2
        group_connectivity_type: 8

      # config for inflation
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 4.0
