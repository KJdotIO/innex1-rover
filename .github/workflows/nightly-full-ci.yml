name: Nightly Full CI

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  decide:
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      previous_sha: ${{ steps.decide.outputs.previous_sha }}
      current_sha: ${{ steps.decide.outputs.current_sha }}
      previous_started_at: ${{ steps.decide.outputs.previous_started_at }}
      ci_image: ${{ steps.image.outputs.image }}
    steps:
      - name: Decide whether a full run is needed
        id: decide
        uses: actions/github-script@v8
        with:
          script: |
            const workflowId = '.github/workflows/nightly-full-ci.yml';
            const branch = context.ref.replace('refs/heads/', '');
            const currentSha = context.sha;

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              branch,
              status: 'completed',
              per_page: 20,
            });

            const previousRun = data.workflow_runs.find((run) =>
              run.id !== context.runId && run.conclusion === 'success'
            );

            const previousSha = previousRun ? previousRun.head_sha : '';
            const previousStartedAt = previousRun ? previousRun.run_started_at : '';

            let shouldRun = 'true';
            if (previousSha === currentSha && previousStartedAt) {
              const ageMs = Date.now() - Date.parse(previousStartedAt);
              const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
              shouldRun = ageMs >= sevenDaysMs ? 'true' : 'false';
            }

            core.setOutput('should_run', shouldRun);
            core.setOutput('previous_sha', previousSha);
            core.setOutput('current_sha', currentSha);
            core.setOutput('previous_started_at', previousStartedAt);

            if (shouldRun === 'true') {
              core.info(
                `Running full CI for ${branch}: ${previousSha || '<none>'} -> ${currentSha}`
              );
            } else {
              core.info(
                `Skipping full CI for ${branch}: ${currentSha} was already checked on ${previousStartedAt}`
              );
            }

      - name: Derive ROS CI image reference
        id: image
        run: |
          owner_lower=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lower}/innex1-rover-ci:humble" >> "$GITHUB_OUTPUT"
        shell: bash

  skip:
    runs-on: ubuntu-22.04
    needs: decide
    if: needs.decide.outputs.should_run != 'true'
    steps:
      - name: Report that the full run is already up to date
        run: |
          echo "Nightly full CI skipped."
          echo "Current commit: ${{ needs.decide.outputs.current_sha }}"
          echo "Last successful nightly/full run already covered this commit."
          echo "Last successful run started at: ${{ needs.decide.outputs.previous_started_at }}"
        shell: bash

  resolve-build-image:
    runs-on: ubuntu-22.04
    needs: decide
    if: needs.decide.outputs.should_run == 'true'
    permissions:
      contents: read
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      prebuilt: ${{ steps.resolve.outputs.prebuilt }}
      image_reason: ${{ steps.resolve.outputs.image_reason }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve ROS CI image
        id: resolve
        env:
          CI_IMAGE: ${{ needs.decide.outputs.ci_image }}
        run: |
          if docker buildx imagetools inspect "$CI_IMAGE" >/tmp/ci-image-inspect.txt 2>/tmp/ci-image-inspect.err; then
            digest=$(awk '/^Digest:/ {print $2}' /tmp/ci-image-inspect.txt)
            if [ -n "$digest" ]; then
              echo "image=${CI_IMAGE%@*}@${digest}" >> "$GITHUB_OUTPUT"
              echo "prebuilt=true" >> "$GITHUB_OUTPUT"
              echo "image_reason=Using published ROS CI image" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "image=ros:humble-ros-base" >> "$GITHUB_OUTPUT"
          echo "prebuilt=false" >> "$GITHUB_OUTPUT"
          echo "image_reason=Falling back because the published ROS CI image is unavailable" >> "$GITHUB_OUTPUT"
        shell: bash

  full-build-and-test:
    runs-on: ubuntu-22.04
    needs:
      - decide
      - resolve-build-image
    if: needs.decide.outputs.should_run == 'true'
    permissions:
      contents: read
    container:
      image: ${{ needs.resolve-build-image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
        shell: bash

      - name: Cache colcon workspace
        uses: actions/cache@v5
        with:
          path: |
            build/
            install/
          key: nightly-colcon-${{ hashFiles('src/**/package.xml', 'src/**/CMakeLists.txt', 'src/**/setup.py') }}
          restore-keys: nightly-colcon-

      - name: Install dependencies
        env:
          USE_PREBUILT_IMAGE: ${{ needs.resolve-build-image.outputs.prebuilt }}
        run: |
          echo "Container image: ${{ needs.resolve-build-image.outputs.image }}"
          echo "Container reason: ${{ needs.resolve-build-image.outputs.image_reason }}"
          if [ "$USE_PREBUILT_IMAGE" != "true" ]; then
            apt-get update
            apt-get install -y python3-colcon-common-extensions python3-rosdep
          fi
          if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            rosdep init
          fi
          rosdep update
          rosdep install --from-paths src -y --ignore-src
        shell: bash

      - name: Run preflight checks
        run: |
          python3 .github/scripts/run_preflight_checks.py
          python3 .github/scripts/check_interface_contracts.py
        shell: bash

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build
        shell: bash

      - name: Run tests
        run: |
          source /opt/ros/humble/setup.bash
          colcon test
        shell: bash

      - name: Check test results
        run: |
          source /opt/ros/humble/setup.bash
          colcon test-result --verbose
        shell: bash
