name: Nightly Full CI

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      contents: read
      pull-requests: read
      packages: read
    uses: ./.github/workflows/ci-reusable.yml
    with:
      force_full_ros: true
    secrets: inherit
