name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    container:
      image: ros:humble-ros-base

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect code-bearing changes
        id: changes
        uses: step-security/paths-filter@v3
        with:
          filters: |
            ros_ci:
              - 'src/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
              - '.github/scripts/**'
              - '.github/contracts/**'

      - name: Cache apt packages
        if: steps.changes.outputs.ros_ci == 'true'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ hashFiles('src/**/package.xml') }}
          restore-keys: apt-

      - name: Cache colcon workspace
        if: steps.changes.outputs.ros_ci == 'true'
        uses: actions/cache@v4
        with:
          path: |
            build/
            install/
          key: colcon-${{ hashFiles('src/**/package.xml', 'src/**/CMakeLists.txt', 'src/**/setup.py') }}
          restore-keys: colcon-

      - name: Skip heavy ROS CI for docs-only changes
        if: steps.changes.outputs.ros_ci != 'true'
        run: echo "No code-bearing changes detected; skipping ROS build and test."
        shell: bash

      - name: Install dependencies
        if: steps.changes.outputs.ros_ci == 'true'
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions python3-rosdep
          rosdep init || true
          rosdep update
          rosdep install --from-paths src -y --ignore-src
        shell: bash

      - name: Build
        if: steps.changes.outputs.ros_ci == 'true'
        run: |
          source /opt/ros/humble/setup.bash
          colcon build
        shell: bash

      - name: Check interface contracts
        if: steps.changes.outputs.ros_ci == 'true'
        run: |
          python3 .github/scripts/check_interface_contracts.py
        shell: bash

      - name: Run tests
        if: steps.changes.outputs.ros_ci == 'true'
        run: |
          source /opt/ros/humble/setup.bash
          colcon test
        shell: bash

      - name: Check test results
        if: steps.changes.outputs.ros_ci == 'true'
        run: |
          source /opt/ros/humble/setup.bash
          colcon test-result --verbose
        shell: bash
