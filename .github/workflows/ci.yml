name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ros_ci: ${{ steps.changes.outputs.ros_ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
        shell: bash

      - name: Detect code-bearing changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ros_ci:
              - 'src/**'
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/scripts/**'
              - '.github/contracts/**'

      - name: Install preflight dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-yaml
          python3 - <<'PY'
          import yaml
          print(f"PyYAML available: {yaml.__version__}")
          PY
        shell: bash

      - name: Run preflight checks
        run: |
          python3 .github/scripts/run_preflight_checks.py
          python3 .github/scripts/check_interface_contracts.py
        shell: bash

  build-and-test:
    needs: preflight
    if: needs.preflight.outputs.ros_ci == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    container:
      image: ros:humble-ros-base

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ hashFiles('src/**/package.xml') }}
          restore-keys: apt-

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            build/
            install/
          key: colcon-${{ hashFiles('src/**/package.xml', 'src/**/CMakeLists.txt', 'src/**/setup.py') }}
          restore-keys: colcon-

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions python3-rosdep
          rosdep init || true
          rosdep update
          rosdep install --from-paths src -y --ignore-src
        shell: bash

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build
        shell: bash

      - name: Run tests
        run: |
          source /opt/ros/humble/setup.bash
          colcon test
        shell: bash

      - name: Check test results
        run: |
          source /opt/ros/humble/setup.bash
          colcon test-result --verbose
        shell: bash
