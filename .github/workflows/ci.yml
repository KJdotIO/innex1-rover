name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      contents: read
      pull-requests: read
      packages: read
    uses: ./.github/workflows/ci-reusable.yml
    with:
      force_full_ros: false
    secrets: inherit
