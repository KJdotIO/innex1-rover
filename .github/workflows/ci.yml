name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      contents: read
      pull-requests: read
      packages: read
    uses: ./.github/workflows/ci-reusable.yml
    with:
      force_full_ros: false
    secrets: inherit

  build-and-test:
    name: build-and-test
    runs-on: ubuntu-22.04
    needs: ci
    if: ${{ always() }}
    steps:
      - name: Mirror reusable CI result for branch protection
        run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            echo "Reusable CI result: ${{ needs.ci.result }}"
            exit 1
          fi
          echo "Reusable CI passed."
        shell: bash
